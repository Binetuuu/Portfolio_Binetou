<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../output.css">
</head>

<body class="bg-amber-50 text-gray-800">

<!-- NAVBAR -->
<header class="bg-gray-700 text-white">
    <nav class="flex justify-between items-center px-8 py-4">
        <h1 class="text-2xl font-bold text-amber-400">Mon Portfolio</h1>

        <div class="flex gap-6">
            <a href="index.html" class="hover:text-amber-400">Accueil</a>
            <a href="lister-projet.html" class="text-amber-400">Projets</a>
            <a href="ajouter.html" class="hover:text-amber-400">Ajouter</a>
            <a href="contact.html" class="text-amber-400">Contact</a>
        </div>
    </nav>
</header>

<!-- TITRE -->
<section class="text-center py-12">
    <h2 class="text-4xl font-bold mb-4">Contactez-moi</h2>
    <p class="text-gray-600">Vous avez une question ou un projet ? Envoyez-moi un message.</p>
</section>

<!-- FORMULAIRE -->
<section class="flex justify-center px-4 pb-20">
    <form class="bg-white p-8 rounded-4xl shadow w-full max-w-xl">

        <!-- NOM -->
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Nom *</label>
            <input type="text"
                   class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400"
                   placeholder="Votre nom">
        </div>

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Email *</label>
            <input type="email"
                   class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400"
                   placeholder="exemple@email.com">
        </div>

        <!-- SUJET -->
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Sujet</label>
            <select class="w-full border rounded px-4 py-2">
                <option>Choisir un sujet</option>
                <option>Projet</option>
                <option>Question</option>
                <option>Autre</option>
            </select>
        </div>

        <!-- MESSAGE -->
        <div class="mb-6">
            <label class="block mb-1 font-semibold">Message *</label>
            <textarea
                class="w-full border rounded px-4 py-2 h-32"
                placeholder="Votre message..."></textarea>
        </div>

        <!-- BOUTON -->
        <button
            class="w-full bg-amber-400 text-white py-3 rounded hover:bg-amber-200">
            Envoyer
        </button>

    </form>
</section>

<!-- INFOS -->
<section class="text-center pb-16">
    <p class="text-gray-600">Ou contactez-moi directement :</p>
    <p class="font-bold mt-2">seye10bineta@gmail.com</p>
</section>

<!-- FOOTER -->
<footer class="bg-gray-800 text-white text-center py-6">
    <p>© 2026 Mon Portfolio</p>
</footer>

</body>
</html>
