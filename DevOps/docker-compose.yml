version: '3.8'

services:
  # Service SonarQube
  sonarqube:
    image: sonarqube:latest
    container_name: portfolio-sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - postgres
    networks:
      - portfolio-network

  # Service PostgreSQL pour SonarQube
  postgres:
    image: postgres:15-alpine
    container_name: portfolio-postgres
    restart: always
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  # Service MongoDB
  mongodb:
    image: mongo:latest
    container_name: portfolio-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: Node
    volumes:
      - mongodb_data:/data/db
    networks:
      - portfolio-network

  # Service Backend
  backend:
    image: binetuuu/portfolio-backend:latest
    container_name: portfolio-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/Node
    depends_on:
      - mongodb
    networks:
      - portfolio-network

  # Service Frontend
  frontend:
    image: binetuuu/portfolio-frontend:latest
    container_name: portfolio-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

# Volumes pour persister les données
volumes:
  mongodb_data:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

# Réseau pour la communication entre conteneurs
networks:
  portfolio-network:
    driver: bridge

