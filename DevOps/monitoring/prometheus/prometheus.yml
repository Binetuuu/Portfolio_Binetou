global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'ubuntu-server'

  # Node Exporter (métriques système Ubuntu)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'ubuntu-server'

  # cAdvisor (métriques conteneurs Docker)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'ubuntu-server'

  # MongoDB Exporter
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
        labels:
          instance: 'ubuntu-server'

  # Backend Application (si endpoints /metrics disponible)
  - job_name: 'backend'
    static_configs:
      - targets: ['portfolio-backend:5000']
        labels:
          instance: 'ubuntu-server'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Jenkins (si plugin Prometheus installé)
  - job_name: 'jenkins'
    static_configs:
      - targets: ['jenkins:8080']
        labels:
          instance: 'ubuntu-server'
    metrics_path: '/prometheus'
    scrape_interval: 30s

  # SonarQube (si endpoint metrics disponible)
  - job_name: 'sonarqube'
    static_configs:
      - targets: ['sonarqube:9000']
        labels:
          instance: 'ubuntu-server'
    metrics_path: '/api/monitoring/metrics'
    scrape_interval: 30s