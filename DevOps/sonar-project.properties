# SonarQube Configuration for Portfolio Project
sonar.projectKey=portfolio-project
sonar.projectName=Portfolio Project
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Backend Source Code
sonar.sources=Backend/src
sonar.exclusions=Backend/node_modules/**,Backend/.git/**,Backend/dist/**

# Backend Tests
sonar.tests=Backend/tests
sonar.test.inclusions=Backend/**/*.test.js,Backend/**/*.spec.js

# JavaScript/Node.js specific
sonar.javascript.lcov.reportPaths=Backend/coverage/lcov.info

# Code Coverage
sonar.coverage.exclusions=Backend/node_modules/**,Backend/tests/**

# SonarQube Server Connection
sonar.host.url=http://sonarqube:9000
sonar.login=${SONAR_LOGIN}
sonar.password=${SONAR_PASSWORD}

# Quality Gate
sonar.qualitygate.wait=true
